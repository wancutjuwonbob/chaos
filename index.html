<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리반 소통 공간</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-100 min-h-screen flex flex-col">

    <header class="bg-custom-green py-4 shadow-sm w-full text-center">
        <h1 class="text-white text-xl md:text-2xl font-bold tracking-wide flex items-center justify-center gap-2">
            🎈 우리반 소통 공간
        </h1>
    </header>

    <main class="flex-grow max-w-3xl w-full mx-auto px-4 py-8 space-y-6">
        
        <section class="bg-white rounded-xl border border-slate-200/80 p-6 shadow-sm">
            <form onsubmit="return false;" class="space-y-4">
                <div>
                    <input type="text" 
                           placeholder="이름을 입력하세요 (예: 1번 홍길동)" 
                           class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-green-500 placeholder-slate-400 bg-white transition-colors">
                </div>
                <div>
                    <textarea rows="4" 
                              placeholder="친구들에게 하고 싶은 이야기를 자유롭게 적어보세요!" 
                              class="w-full px-4 py-3 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-green-500 placeholder-slate-400 bg-white resize-none transition-colors"></textarea>
                </div>
                <div class="flex items-center space-x-2 py-1">
                    <input type="file" id="file-upload" class="hidden">
                    <label for="file-upload" class="cursor-pointer bg-slate-50 border border-slate-300 hover:bg-slate-100 text-slate-700 text-xs font-medium py-2 px-3 rounded transition-colors">
                        파일 선택
                    </label>
                    <span class="text-xs text-slate-500">선택된 파일 없음</span>
                </div>
                <div>
                    <button type="submit" class="w-full bg-custom-green hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg text-sm tracking-wide shadow-sm transition-colors">
                        새 글 올리기
                    </button>
                </div>
            </form>
        </section>

        <section class="bg-white rounded-xl border border-slate-200/80 p-6 shadow-sm space-y-4">
            <div>
                <h2 class="text-base font-bold text-slate-900 tracking-tight">담임 선생님</h2>
            </div>
            <div class="pb-2">
                <p class="text-sm text-slate-800 leading-relaxed">
                    우리반 홈페이지에 온 걸 환영해! 이곳에 재미있는 사진과 글을 많이 남겨주렴. 😊
                </p>
            </div>

            <div class="bg-slate-50 rounded-lg p-4 space-y-4 border border-slate-100">
                <div class="text-sm">
                    <span class="font-bold text-slate-900 mr-2">반장:</span>
                    <span class="text-slate-700">네 선생님! 열심히 활동하겠습니다!</span>
                </div>
                
                <form onsubmit="return false;" class="flex items-center border border-slate-300 rounded-md bg-white overflow-hidden focus-within:border-blue-500 transition-colors">
                    <input type="text" 
                           placeholder="의견을 남겨주세요..." 
                           class="flex-grow px-3 py-2 text-sm focus:outline-none bg-white placeholder-slate-400">
                    <button type="submit" class="bg-custom-blue hover:bg-blue-600 text-white text-xs font-semibold px-4 py-2.5 transition-colors shrink-0">
                        등록
                    </button>
                </form>
            </div>
        </section>

    </main>

    <footer class="py-4 text-center text-xs text-slate-400">
        © 2026 우리반 소통 공간. Powered by GitHub Pages.
    </footer>

</body>
</html>
